{% extends 'base.html' %}

{% block content %}

<div class="col-md-8 offset-md-2">

    <h2 class="fw-bold">{{ post.title }}</h2>

    <img src="{{ url_for('static', filename='uploads/' + post.image) }}" 
         class="img-fluid rounded my-3">

    <p class="text-muted">By {{ post.author }}</p>

    <p>{{ post.content }}</p>

</div>

{% endblock %}
