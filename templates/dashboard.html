{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Admin Dashboard</h3>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Action</th>
    </tr>

    {% for post in posts %}
    <tr>
        <td>{{ post.id }}</td>
        <td>{{ post.title }}</td>
        <td>
            <a href="/delete/{{ post.id }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/admin-logout" class="btn btn-secondary">Logout</a>

{% endblock %}
